name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Release v${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Rust / cargo-skyline setup
      # -----------------------------------------------------------------------
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Cache cargo-skyline binary
        id: cache-cargo-skyline
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-skyline
          key: ${{ runner.os }}-cargo-skyline-3.5.0

      - name: Install cargo-skyline
        if: steps.cache-cargo-skyline.outputs.cache-hit != 'true'
        run: cargo install cargo-skyline --version 3.5.0 --locked

      - name: Download skyline stdlib
        run: cargo skyline update-std

      # -----------------------------------------------------------------------
      # 3. Compile
      # -----------------------------------------------------------------------
      - name: Build with cargo skyline
        env:
          CARGO_TERM_COLOR: never
        run: |
          cargo skyline build --release --features="main_nro" > build.log 2>&1 &
          BUILD_PID=$!
          echo "Build started with PID $BUILD_PID"
          while kill -0 $BUILD_PID 2>/dev/null; do
            tail -n5 build.log 2>/dev/null || true
            sleep 10
          done
          wait $BUILD_PID
          EXIT_CODE=$?
          echo "--- Full build log ---"
          cat build.log
          exit $EXIT_CODE

      # -----------------------------------------------------------------------
      # 4. Full build
      # -----------------------------------------------------------------------
      - name: Package full release
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_release.py "${{ github.event.inputs.version }}" full

      - name: Clone Ultimate S Stages and add to full release
        run: |
          git clone https://x-access-token:${{ secrets.STAGES_REPO_TOKEN }}@github.com/chrispo-git/Ultimate-S-Stages.git stages_repo
          cp -r "stages_repo/Ultimate S Stages" "releases/ultimate/mods/Ultimate S Stages"
          echo "Stages folder copied. Contents:"
          find "releases/ultimate/mods/Ultimate S Stages" -maxdepth 2 | head -20

      # -----------------------------------------------------------------------
      # 5. Lite build (reuses same .nro)
      # -----------------------------------------------------------------------
      - name: Package lite release
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_release.py "${{ github.event.inputs.version }}" lite

      # -----------------------------------------------------------------------
      # 6. Fetch previous full release zip and extract old folders for diff
      # -----------------------------------------------------------------------
      - name: Fetch previous full release asset
        id: prev_release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // Get all releases, skip drafts, find the latest published one
            // that has a non-lite, non-diff zip asset
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner, repo
            });

            let targetAsset = null;
            for (const release of releases) {
              if (release.draft) {
                console.log(`Skipping draft release: ${release.tag_name}`);
                continue;
              }
              const asset = release.assets.find(a =>
                a.name.endsWith('.zip') &&
                !a.name.toLowerCase().includes('lite') &&
                !a.name.toLowerCase().includes('diff')
              );
              if (asset) {
                console.log(`Found previous full release: ${release.tag_name} -> ${asset.name}`);
                core.setOutput('asset_id', asset.id);
                core.setOutput('asset_url', 'found');
                core.setOutput('asset_name', asset.name);
                targetAsset = asset;
                break;
              }
            }

            if (!targetAsset) {
              console.log('No previous full release found - diff will be skipped');
              core.setOutput('asset_url', '');
              core.setOutput('asset_id', '');
            }

      - name: Download and extract previous full release
        if: steps.prev_release.outputs.asset_url != ''
        run: |
          mkdir -p prev_release
          curl -fSL --retry 5 --retry-delay 5 \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${{ github.repository }}/releases/assets/${{ steps.prev_release.outputs.asset_id }}" \
            -o prev_release/prev.zip
          echo "Downloaded $(du -sh prev_release/prev.zip | cut -f1)"
          unzip -q prev_release/prev.zip -d prev_release/extracted
          echo "Extracted contents:"
          find prev_release/extracted -maxdepth 4 | head -40

      - name: Locate old Arcropolis and Stages folders
        if: steps.prev_release.outputs.asset_url != ''
        id: prev_dirs
        run: |
          # Find the "Ultimate S Arcropolis" folder inside ultimate/mods/
          OLD_ARC=$(find prev_release/extracted -type d -name "Ultimate S Arcropolis" | head -1)
          OLD_STAGES=$(find prev_release/extracted -type d -name "Ultimate S Stages" | head -1)
          echo "old_arcropolis=$OLD_ARC" >> $GITHUB_OUTPUT
          echo "old_stages=$OLD_STAGES" >> $GITHUB_OUTPUT
          echo "Old Arcropolis: $OLD_ARC"
          echo "Old Stages: $OLD_STAGES"

      # -----------------------------------------------------------------------
      # 7. Diff build
      # -----------------------------------------------------------------------
      - name: Package diff release
        if: steps.prev_release.outputs.asset_url != '' && steps.prev_dirs.outputs.old_arcropolis != ''
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -u scripts/build_release.py \
            "${{ github.event.inputs.version }}" \
            diff \
            "${{ steps.prev_dirs.outputs.old_arcropolis }}" \
            "${{ steps.prev_dirs.outputs.old_stages }}"

      - name: Skip diff (no previous release found)
        if: steps.prev_release.outputs.asset_url == ''
        run: echo "No previous full release found — skipping diff build."

      # -----------------------------------------------------------------------
      # 8. Fetch all assets from latest Ultimate-S-Setup release and bundle
      #    them into the full release folder
      # -----------------------------------------------------------------------
      - name: Fetch Ultimate-S-Setup release asset list
        id: setup_assets
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SETUP_REPO_TOKEN }}
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: 'chrispo-git',
              repo: 'Ultimate-S-Setup'
            });
            console.log(`Latest Ultimate-S-Setup release: ${release.data.tag_name}`);
            const assets = release.data.assets.map(a => ({ id: a.id, name: a.name }));
            console.log(`Assets: ${assets.map(a => a.name).join(', ')}`);
            core.setOutput('assets_json', JSON.stringify(assets));

      - name: Download Ultimate-S-Setup assets via curl
        run: |
          mkdir -p setup_assets
          echo '${{ steps.setup_assets.outputs.assets_json }}' | python3 -c "
          import json, sys, os, subprocess
          assets = json.load(sys.stdin)
          for asset in assets:
              url = f\"https://api.github.com/repos/chrispo-git/Ultimate-S-Setup/releases/assets/{asset['id']}\"
              out = f\"setup_assets/{asset['name']}\"
              print(f\"Downloading: {asset['name']}\")
              subprocess.run([
                  'curl', '-fSL', '--retry', '5', '--retry-delay', '5',
                  '-H', 'Authorization: Bearer ${{ secrets.SETUP_REPO_TOKEN }}',
                  '-H', 'Accept: application/octet-stream',
                  url, '-o', out
              ], check=True)
              print(f\"  Saved to: {out} ({os.path.getsize(out)} bytes)\")
          "
          echo "Downloaded assets:"
          ls -lh setup_assets/

      - name: Extract and place setup assets into full release
        run: |
          RELEASES_ROOT="releases"

          for f in setup_assets/*; do
            name=$(basename "$f")
            echo "Processing: $name"

            tmp="setup_tmp/$name"
            mkdir -p "$tmp"

            if [[ "$f" == *.tar.gz ]]; then
              tar -xzf "$f" -C "$tmp"
            elif [[ "$f" == *.zip ]]; then
              unzip -q "$f" -d "$tmp"
            else
              cp "$f" "$tmp/"
            fi

            echo "  Extracted contents of $name:"
            find "$tmp" -maxdepth 2

            # Linux .tar.gz — contents are already at the right level
            if [[ "$name" == *linux* ]]; then
              cp -r "$tmp"/. "$RELEASES_ROOT/"
              echo "  Placed Linux release at releases root"

            # Mac .zip — strip one level (/UltimateSSetup/) before placing
            elif [[ "$name" == *mac* ]]; then
              MAC_INNER=$(find "$tmp" -mindepth 1 -maxdepth 1 -type d | head -1)
              echo "  Mac inner dir: $MAC_INNER"
              cp -r "$MAC_INNER"/. "$RELEASES_ROOT/"
              echo "  Placed Mac release at releases root"

            # Windows .zip — strip two levels (/UltimateSSetup/UltimateSSetup/) before placing
            elif [[ "$name" == *windows* ]]; then
              WIN_INNER=$(find "$tmp" -mindepth 2 -maxdepth 2 -type d | head -1)
              echo "  Windows inner dir: $WIN_INNER"
              cp -r "$WIN_INNER"/. "$RELEASES_ROOT/"
              echo "  Placed Windows release at releases root"

            else
              cp -r "$tmp"/. "$RELEASES_ROOT/"
              echo "  Placed unknown asset at releases root"
            fi
          done

          echo "Setup assets placed. Full releases/ contents:"
          find releases -maxdepth 3 | head -60

      # -----------------------------------------------------------------------
      # 9. Re-zip full release now that setup assets and stages are included
      # -----------------------------------------------------------------------
      - name: Re-zip full release with setup assets and stages
        run: |
          ZIP="releases/Ultimate S Arcropolis.zip"
          rm -f "$ZIP"
          # Zip everything in releases/ except the zip itself
          cd releases
          zip -r "Ultimate S Arcropolis.zip" . --exclude "Ultimate S Arcropolis.zip"
          cd ..
          echo "Re-zipped: $ZIP"
          ls -lh "$ZIP"

      # -----------------------------------------------------------------------
      # 10. Create draft GitHub release and upload all artifacts
      # -----------------------------------------------------------------------
      - name: Create draft release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const version = '${{ github.event.inputs.version }}';

            const release = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: `v${version}`,
              name: `v${version}`,
              body: '<!-- Add release notes here -->',
              draft: true,
              prerelease: false
            });

            console.log(`Created draft release: ${release.data.html_url}`);
            core.setOutput('release_id', release.data.id);
            core.setOutput('upload_url', release.data.upload_url);

      - name: Upload Full Release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          DOTVER="${VERSION//./.}"
          FNAME="Ultimate.S.${DOTVER}.zip"
          cp "releases/Ultimate S Arcropolis.zip" "releases/${FNAME}"
          gh release upload "v${VERSION}" \
            "releases/${FNAME}" \
            --repo "${{ github.repository }}" \
            --clobber
          echo "Uploaded: ${FNAME}"

      - name: Upload Lite artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          DOTVER="${VERSION//./.}"
          FNAME="Ultimate.S.Lite.${DOTVER}.zip"
          cp "releases-lite/Ultimate S Lite.zip" "releases-lite/${FNAME}"
          gh release upload "v${VERSION}" \
            "releases-lite/${FNAME}" \
            --repo "${{ github.repository }}" \
            --clobber
          echo "Uploaded: ${FNAME}"

      - name: Upload Diff artifact
        if: steps.prev_release.outputs.asset_url != '' && steps.prev_dirs.outputs.old_arcropolis != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f "releases-diff/ult_s_diff.zip" ]; then
            echo "No diff zip found, skipping."
            exit 0
          fi
          gh release upload "v${{ github.event.inputs.version }}" \
            "releases-diff/ult_s_diff.zip" \
            --repo "${{ github.repository }}" \
            --clobber
          echo "Uploaded: ult_s_diff.zip"

      - name: Release URL
        run: |
          echo "Draft release created!"
          echo "https://github.com/${{ github.repository }}/releases"
          echo "Version: v${{ github.event.inputs.version }}"