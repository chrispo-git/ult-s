name: Build Small Release

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  build:
    name: Build Small Release (build_small.py)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-small-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-small-

      - name: Install cargo-skyline
        run: cargo install cargo-skyline

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Test cargo fetch
        working-directory: .
        run: cargo fetch
        timeout-minutes: 5

      - name: Run build_small.py
        working-directory: scripts
        run: python build_small.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultimate-s-arcropolis-small
          path: "releases/Ultimate S Arcropolis (plugin and common files only).zip"
          if-no-files-found: error

      - name: Comment on PR with download link
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const runId = context.runId;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

            const body = [
              '## ✅ Small Build Complete (plugin + common files)',
              '',
              `**Workflow run:** [View Run](${runUrl})`,
              '',
              '**Artifact:** `Ultimate S Arcropolis (plugin and common files only).zip`',
              '',
              `> Download the artifact from the [Actions run page](${runUrl}) under the **Artifacts** section.`,
              '',
              '---',
              `*Built from commit \`${{ github.event.pull_request.head.sha }}\` on PR #${prNumber}*`
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body
            });