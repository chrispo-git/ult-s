name: Build Full Release

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  build:
    name: Build Full Release (build_git.py)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-full-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-full-

      - name: Cache cargo-skyline binary
        id: cache-cargo-skyline
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-skyline
          key: ${{ runner.os }}-cargo-skyline-3.5.0

      - name: Install cargo-skyline
        if: steps.cache-cargo-skyline.outputs.cache-hit != 'true'
        run: cargo install cargo-skyline --version 3.5.0 --locked

      - name: Download skyline stdlib
        run: cargo skyline update-std

      - name: Build with cargo skyline
        env:
          CARGO_TERM_COLOR: never
        run: |
          cargo skyline build --release --features="main_nro" > build.log 2>&1 &
          BUILD_PID=$!
          echo "Build started with PID $BUILD_PID"
          while kill -0 $BUILD_PID 2>/dev/null; do
            tail -n5 build.log 2>/dev/null || true
            sleep 10
          done
          wait $BUILD_PID
          EXIT_CODE=$?
          echo "--- Full build log ---"
          cat build.log
          exit $EXIT_CODE

      - name: Get changed files in PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: prNumber
            });
            const paths = files.map(f => f.filename);
            console.log(`Changed files (${paths.length}):`);
            paths.forEach(p => console.log(`  ${p}`));
            fs.writeFileSync('changed_files.json', JSON.stringify(paths));

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Package release (build_git.py)
        working-directory: scripts
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u build_git.py ${{ github.event.pull_request.number }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultimate-s-arcropolis-full
          path: releases/Ultimate S Arcropolis.zip
          if-no-files-found: error

      - name: Comment on PR with download link
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const runId = context.runId;

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner, repo, run_id: runId
            });
            const artifact = artifacts.data.artifacts.find(a => a.name === 'ultimate-s-arcropolis-full');
            const artifactUrl = artifact
              ? `https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${artifact.id}`
              : `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

            const body = [
              '## Build Complete',
              '',
              `**[Download Ultimate S Arcropolis.zip](${artifactUrl})**`,
              '',
              '_Expires after 90 days. Requires being logged in to GitHub._',
              '',
              '---',
              `*Built from commit \`${{ github.event.pull_request.head.sha }}\` on PR #${prNumber}*`
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body
            });