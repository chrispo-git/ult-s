name: Build Full Release

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  build:
    name: Build Full Release (build.py)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-full-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-full-

      - name: Cache cargo-skyline binary
        id: cache-cargo-skyline
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-skyline.exe
          key: ${{ runner.os }}-cargo-skyline-3.5.0

      - name: Install cargo-skyline
        if: steps.cache-cargo-skyline.outputs.cache-hit != 'true'
        run: cargo install cargo-skyline --version 3.5.0 --locked

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Run build.py
        working-directory: scripts
        env:
          PYTHONUNBUFFERED: "1"
          CARGO_TERM_COLOR: always
        run: python -u build.py ${{ github.event.pull_request.number }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultimate-s-arcropolis-full
          path: releases/Ultimate S Arcropolis.zip
          if-no-files-found: error

      - name: Comment on PR with download link
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const runId = context.runId;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

            const body = [
              '## ✅ Full Build Complete',
              '',
              `**Workflow run:** [View Run](${runUrl})`,
              '',
              '**Artifact:** `Ultimate S Arcropolis.zip`',
              '',
              `> Download the artifact from the [Actions run page](${runUrl}) under the **Artifacts** section.`,
              '',
              '---',
              `*Built from commit \`${{ github.event.pull_request.head.sha }}\` on PR #${prNumber}*`
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body
            });